name: Android Build APK

# Trigger: Run on push or pull request to the dev branch
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code (Updated to v6 for Node.js 24 support)
    - name: Checkout code
      uses: actions/checkout@v6

    # 2. Set up JDK environment (Updated to v5 for Node.js 24 support)
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Grant execute permission for gradlew (Prevents permission denied errors)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Run Gradle build command (Generates Debug APK)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. Upload the generated APK to GitHub Actions artifacts (Updated to v6 for Node.js 24 support)
    - name: Upload APK
      uses: actions/upload-artifact@v6
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        # Retain the artifact for 30 days
        retention-days: 30
